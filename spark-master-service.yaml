apiVersion: v1
kind: Service
metadata:
  name: spark-master-service
  labels:
    app: spark
    component: master
spec:
  selector:
    app: spark
    component: master
  type: NodePort
  ports:
  - name: spark-rpc
    port: 7077
    targetPort: 7077
    nodePort: 30077  # Порт для подключения worker'ов
  - name: spark-web
    port: 8080
    targetPort: 8080
    nodePort: 30080  # Порт для веб-интерфейса в браузере
